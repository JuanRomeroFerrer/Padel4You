resolver 8.8.8.8 8.8.4.4 valid=10s;
resolver_timeout 5s;

server {
    listen 8080;
    server_name _;

    # Frontend
    location / {
        root /app;
        try_files $uri /Padel4You.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API - Proxy al backend externo
    location /api/ {
        proxy_pass https://padel4you-backend-production.up.railway.app;

        proxy_http_version 1.1;
        proxy_set_header Host padel4you-backend-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Ignorar SSL errors
        proxy_ssl_verify off;
        proxy_ssl_verify_depth 0;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}