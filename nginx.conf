server {
    listen 8080;
    server_name _;

    # Frontend
    location / {
        root /app;
        try_files $uri /Padel4You.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API - Proxy al backend
    # Usar HTTPS hacia el backend externo en Railway
    location /api/ {
        proxy_pass https://padel4you-backend-production.up.railway.app;

        proxy_http_version 1.1;
        proxy_set_header Host padel4you-backend-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_set_header Authorization $http_authorization;

        # SSL - Ignorar errores de certificado
        proxy_ssl_verify off;
        proxy_ssl_verify_depth 0;
        proxy_ssl_session_reuse on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check del proxy
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}