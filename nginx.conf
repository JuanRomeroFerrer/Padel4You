server {
    listen 8080;
    server_name _;

    # Frontend
    location / {
        root /app;
        try_files $uri /Padel4You.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API - Proxy simple sin SSL
    location /api/ {
        # Redirigir al backend sin verificación SSL
        proxy_pass https://padel4you-backend-production.up.railway.app;

        proxy_http_version 1.1;
        proxy_set_header Host padel4you-backend-production.up.railway.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Configuración SSL permisiva
        proxy_ssl_verify off;
        proxy_ssl_verify_depth 1024;
        proxy_ssl_session_reuse off;
        proxy_ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
        proxy_ssl_ciphers DEFAULT:!aNULL:!eNULL:!MD5:!3DES:!DES:!RC4:!IDEA:!SEED:!aDSS:!SRP:!PSK;

        # Timeouts largos
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}