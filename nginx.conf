upstream backend {
    server padel4you-backend-production.up.railway.app:443;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    # Frontend
    location / {
        root /app;
        try_files $uri /Padel4You.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API - Proxy al backend
    location /api/ {
        proxy_pass https://backend;
        proxy_ssl_session_reuse on;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Host padel4you-backend-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_set_header Authorization $http_authorization;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Errores
        proxy_intercept_errors on;
        error_page 502 503 504 /502.html;
    }

    # Health check del proxy
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Error page
    location = /502.html {
        return 502 "Backend unavailable";
        add_header Content-Type text/plain;
    }
}