<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel4You – Club de Pádel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- API Configuration -->
  <script>
    // Backend API URL - Configurar según el ambiente
    window.API_URL = 'https://padel4you-backend-production.up.railway.app/api';
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        oklch(22% 0.08 258);
      --navy-mid:    oklch(30% 0.07 258);
      --navy-light:  oklch(42% 0.06 258);
      --green:       oklch(52% 0.18 152);
      --green-mid:   oklch(60% 0.19 150);
      --green-bright:oklch(67% 0.20 148);
      --green-pale:  oklch(95% 0.04 152);
      --white:       oklch(99% 0.006 258);
      --off-white:   oklch(97.5% 0.008 258);
      --gray-light:  oklch(93% 0.010 258);
      --gray-mid:    oklch(78% 0.015 258);
      --gray:        oklch(55% 0.015 258);
      --text:        oklch(18% 0.025 258);
      --text-muted:  oklch(52% 0.020 258);
      --red:         oklch(54% 0.22 25);
      --red-pale:    oklch(95% 0.06 25);
      --amber:       oklch(72% 0.18 75);
      --amber-pale:  oklch(96% 0.05 75);

      --font-heading: 'Outfit', sans-serif;
      --font-body:    'Plus Jakarta Sans', sans-serif;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;

      --shadow-sm: 0 1px 4px oklch(0% 0 0 / 0.07), 0 1px 2px oklch(0% 0 0 / 0.05);
      --shadow-md: 0 4px 18px oklch(0% 0 0 / 0.09), 0 2px 8px oklch(0% 0 0 / 0.05);
      --shadow-lg: 0 10px 36px oklch(0% 0 0 / 0.12), 0 4px 16px oklch(0% 0 0 / 0.06);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    input, textarea, select { font-family: inherit; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--gray-light); }
    ::-webkit-scrollbar-thumb { background: var(--gray-mid); border-radius: 3px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .page-anim { animation: fadeUp 0.35s ease both; }

    /* Mobile nav helpers */
    @media (max-width: 768px) {
      .nav-desktop { display: none !important; }
      .nav-mobile-btn { display: flex !important; }
      .hero-title { font-size: clamp(36px, 8vw, 60px) !important; }
    }
    @media (min-width: 769px) {
      .nav-mobile-btn { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="home-page.jsx"></script>
  <script type="text/babel" src="reservations-page.jsx"></script>
  <script type="text/babel" src="about-page.jsx"></script>
  <script type="text/babel" src="account-page.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
